<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        .btn { padding: 10px 20px; cursor: pointer; color: white; border: none; }
        #addForm { display: none; margin-top: 20px; border: 1px solid #ddd; padding: 15px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h3>TAX Payment</h3>
    <div class="input-group">
        <label>TIN*</label>
        <div style="display:flex;">
            <input type="text" id="tinSearch" placeholder="Enter TIN to search...">
            <button class="btn" style="background:#007bff;" onclick="searchByTIN()">🔍</button>
        </div>
    </div>

    <div id="resultArea"></div>

    <button onclick="document.getElementById('addForm').style.display='block'" style="font-size:24px; cursor:pointer;">➕</button>

    <div id="addForm">
        <h4>Add New Data</h4>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="tin" placeholder="TIN">
        <input type="text" id="address" placeholder="Address">
        <input type="text" id="zone" placeholder="Taxes Zone">
        <input type="text" id="circle" placeholder="Taxes Circle">
        <input type="text" id="account" placeholder="Account Code">
        <button class="btn" style="background:#28a745; margin-top:10px;" onclick="saveData()">Save Data</button>
        <button class="btn" style="background:#dc3545;" onclick="this.parentElement.style.display='none'">Close</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_7qaz7zrpPh4PSkPdJ0sG1Oj8NPD2w4mzbn_ZbNFMlqR2EWuwFK5gxyESPE3gUL3C5Q/exec";

    function searchByTIN() {
        let tin = document.getElementById("tinSearch").value;
        fetch(SCRIPT_URL + "?q=" + tin)
            .then(res => res.json())
            .then(data => {
                let found = data.find(row => row[2] == tin); // ধরে নিচ্ছি TIN ৩য় কলামে
                if(found) {
                    document.getElementById("resultArea").innerHTML = 
                    `<p>Name: ${found[1]}</p><p>Address: ${found[6]}</p><p>Zone: ${found[4]}</p>`;
                } else {
                    alert("No Data Found!");
                }
            });
    }

    function saveData() {
        let data = {
            name: document.getElementById("name").value,
            tin: document.getElementById("tin").value,
            address: document.getElementById("address").value,
            zone: document.getElementById("zone").value,
            circle: document.getElementById("circle").value,
            account: document.getElementById("account").value
        };
        fetch(SCRIPT_URL, {method: "POST", body: JSON.stringify(data)})
            .then(() => alert("Saved Successfully!"));
    }
</script>
</body>
</html>
