<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-search { background: #007bff; }
        .btn-save { background: #28a745; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h3>TAX Payment Database</h3>
    <input type="text" id="searchInput" placeholder="Search Name or TIN...">
    <button class="btn-search" onclick="searchData()">Search</button>
    <div id="resultArea" style="margin-top:15px; padding:10px; background:#f0f0f0;"></div>

    <hr>
    <h4>Add New Data:</h4>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="tin" placeholder="TIN">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="zone" placeholder="Zone">
    <input type="text" id="circle" placeholder="Circle">
    <input type="text" id="address" placeholder="Address">
    <button class="btn-save" onclick="saveData()">Save Data</button>
</div>

<script>
    // আপনার লিংকটি নিচে বসানো হয়েছে
    const SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnRZILnxnol3ZfhsXdt3NrIxLD9TYEPJSa5F4XxwkpK7wWfmrETvLNkY7ZPGGmL8WUVWmFm0f2liYFSsSrlq1sJ_4KsSnc0oS2BeXHhrrCSdaPeoQAWcbXXWNzWqg-OWk73wbobcc-M5HMk3eurDP8VQAhglmGyAZFcYPNQvhSq5zDsYtyd-kVf5K8JIF_pDjQsm403FmXrOPWZ14Ktb23J6Kc7H7ELT6o5NwPWhQyuFKWMC7QE1vhnHHgxlG0D61MwshJ_x8r17aRz_WwDypC8mHp5xng&lib=MjK7f8y5EZVNMoHY67kcIzwOHd-IMoZnG";

    function searchData() {
        var res = document.getElementById("resultArea");
        res.innerText = "Searching...";
        fetch(SCRIPT_URL + "?q=" + document.getElementById("searchInput").value)
            .then(res => res.json())
            .then(data => res.innerText = JSON.stringify(data))
            .catch(() => res.innerText = "Error!");
    }

    function saveData() {
        var data = {
            name: document.getElementById("name").value,
            tin: document.getElementById("tin").value,
            mobile: document.getElementById("mobile").value,
            zone: document.getElementById("zone").value,
            circle: document.getElementById("circle").value,
            address: document.getElementById("address").value
        };
        fetch(SCRIPT_URL, {method: "POST", body: JSON.stringify(data)})
            .then(() => alert("Data Saved Successfully!"));
    }
</script>
</body>
</html>
