<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 15px; background: #f4f4f4; }
        .box { background: white; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>TAX Database Search</h3>
        <input type="text" id="searchInput" placeholder="Search by Name or TIN...">
        <button class="btn" style="background:#007bff;" onclick="searchData()">Search</button>
    </div>

    <div id="resultArea"></div>

    <div class="box">
        <button class="btn" style="background:#28a745;" onclick="document.getElementById('addForm').style.display='block'">+ Add New Data</button>
    </div>

    <div id="addForm" class="box" style="display:none;">
        <h4>Add New Information</h4>
        <input type="text" id="name" placeholder="Assessee Name">
        <input type="text" id="tin" placeholder="TIN">
        <input type="text" id="mobile" placeholder="Mobile No">
        <input type="text" id="password" placeholder="Password">
        <input type="text" id="zone" placeholder="Zone">
        <input type="text" id="circle" placeholder="Circle">
        <input type="text" id="address" placeholder="Address">
        <input type="text" id="ref" placeholder="Ref">
        <input type="text" id="lives" placeholder="Lives">
        <input type="text" id="work" placeholder="Work Status">
        <button class="btn" style="background:#28a745;" onclick="saveData()">Save Data</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_7qaz7zrpPh4PSkPdJ0sG1Oj8NPD2w4mzbn_ZbNFMlqR2EWuwFK5gxyESPE3gUL3C5Q/exec";

    function searchData() {
        let q = document.getElementById("searchInput").value.toLowerCase();
        fetch(SCRIPT_URL + "?q=" + q).then(res => res.json()).then(data => {
            let res = data.filter(row => row.some(c => String(c).toLowerCase().includes(q)));
            let html = "<div class='box'><strong>Results:</strong><br>";
            res.forEach(row => {
                html += `<p><b>Name:</b> ${row[1]}<br><b>TIN:</b> ${row[2]}<br><b>Password:</b> ${row[4]}<br><b>Address:</b> ${row[7]}<br><b>Status:</b> ${row[10]}</p><hr>`;
            });
            document.getElementById("resultArea").innerHTML = html + "</div>";
        });
    }

    function saveData() {
        let payload = {
            name: document.getElementById("name").value,
            tin: document.getElementById("tin").value,
            mobile: document.getElementById("mobile").value,
            password: document.getElementById("password").value,
            zone: document.getElementById("zone").value,
            circle: document.getElementById("circle").value,
            address: document.getElementById("address").value,
            ref: document.getElementById("ref").value,
            lives: document.getElementById("lives").value,
            work: document.getElementById("work").value
        };
        fetch(SCRIPT_URL, {method: "POST", body: JSON.stringify(payload)})
            .then(() => { alert("Saved Successfully!"); location.reload(); });
    }
</script>
</body>
</html>
