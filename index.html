<!DOCTYPE html>
<html>
<body>
    <input type="text" id="searchInput" placeholder="Search...">
    <button onclick="searchData()">Search</button>
    <div id="resultArea"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_7qaz7zrpPh4PSkPdJ0sG1Oj8NPD2w4mzbn_ZbNFMlqR2EWuwFK5gxyESPE3gUL3C5Q/exec";

    function searchData() {
        var res = document.getElementById("resultArea");
        res.innerHTML = "Searching...";
        var query = document.getElementById("searchInput").value;
        
        fetch(SCRIPT_URL + "?q=" + encodeURIComponent(query))
        .then(response => response.json())
        .then(data => {
            if(data.length === 0) {
                res.innerHTML = "No results found.";
            } else {
                let html = "<table border='1'>";
                data.forEach(row => {
                    html += "<tr>";
                    row.forEach(cell => {
                        html += "<td>" + cell + "</td>";
                    });
                    html += "</tr>";
                });
                html += "</table>";
                res.innerHTML = html;
            }
        })
        .catch(error => {
            res.innerHTML = "Error! Check URL.";
        });
    }
</script>
</body>
</html>
