<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAX Payment Database Search</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 30px; color: #555555; }
        .container { max-width: 650px; margin: 0 auto; }
        .page-title { font-size: 20px; color: #5c768d; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 25px; }
        .search-row { display: flex; align-items: center; margin-bottom: 20px; }
        .search-row label { width: 150px; font-size: 14px; color: #333333; font-weight: bold; }
        .input-group { display: flex; flex: 1; gap: 10px; }
        input[type="text"] { width: 100%; padding: 7px 10px; border: 1px solid #cccccc; border-radius: 4px; font-size: 14px; outline: none; }
        .btn-search { background-color: #007bff; color: white; border: none; padding: 6px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .loading { display: none; font-size: 13px; color: #666; margin-bottom: 15px; font-style: italic; }
        
        /* নতুন মাল্টিপল রেজাল্ট তালিকার উন্নত স্টাইল */
        .results-list { display: none; background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; padding: 12px; margin-bottom: 20px; }
        .results-list p { margin: 0 0 10px 0; font-weight: bold; color: #333; font-size: 14px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .result-item { padding: 10px 14px; background: #fff; border: 1px solid #eee; margin-bottom: 6px; cursor: pointer; border-radius: 4px; font-size: 13px; line-height: 1.5; }
        .result-item:hover { background: #e3f2fd; border-color: #bbdefb; }
        
        .result-table { width: 100%; border-collapse: collapse; margin-top: 10px; display: none; }
        .result-table td { padding: 8px 0; font-size: 14px; }
        .result-table td.label-cell { width: 150px; color: #333333; font-weight: bold; }
        .result-table input, .result-table textarea { width: 100%; padding: 7px 10px; border: 1px solid #cccccc; border-radius: 4px; background-color: #f8f9fa; color: #333333; font-size: 14px; box-sizing: border-box; resize: none; outline: none; }
        .status-badge { display: inline-block; background-color: #17a2b8; color: white; padding: 5px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">TAX Payment Database</div>
    
    <div class="search-row">
        <label>Search Taxpayer *</label>
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Enter Name or TIN...">
            <button class="btn-search" onclick="searchFromSheet()">Search</button>
        </div>
    </div>

    <div id="loadingText" class="loading">Searching database...</div>
    <div id="resultsList" class="results-list"></div>

    <table class="result-table" id="resultTable">
        <tr><td class="label-cell">SL.</td><td><input type="text" id="resSl" readonly></td></tr>
        <tr><td class="label-cell">Assessee Name</td><td><input type="text" id="resName" readonly></td></tr>
        <tr><td class="label-cell">Tin</td><td><input type="text" id="resTin" readonly></td></tr>
        <tr><td class="label-cell">Mobail No</td><td><input type="text" id="resMobile" readonly></td></tr>
        <tr><td class="label-cell">Password</td><td><input type="text" id="resPassword" readonly></td></tr>
        <tr><td class="label-cell">Zone</td><td><input type="text" id="resZone" readonly></td></tr>
        <tr><td class="label-cell">Circle</td><td><input type="text" id="resCircle" readonly></td></tr>
        <tr><td class="label-cell">Address</td><td><textarea id="resAddress" rows="2" readonly></textarea></td></tr>
        <tr><td class="label-cell">Ref</td><td><input type="text" id="resRef" readonly></td></tr>
        <tr><td class="label-cell">Lives</td><td><input type="text" id="resLives" readonly></td></tr>
        <tr><td class="label-cell">Work Status</td><td><span id="resStatus" class="status-badge"></span></td></tr>
    </table>
</div>

<script>
    let matchedRows = [];

    async function searchFromSheet() {
        const query = document.getElementById("searchInput").value.toLowerCase().trim();
        const resultTable = document.getElementById("resultTable");
        const loadingText = document.getElementById("loadingText");
        const MathResultsList = document.getElementById("resultsList");

        if (!query) {
            alert("Please enter Name or TIN!");
            return;
        }

        loadingText.style.display = "block";
        resultTable.style.display = "none";
        MathResultsList.style.display = "none";
        MathResultsList.innerHTML = "";
        matchedRows = [];

        const cacheBuster = new Date().getTime();
        const url = `https://docs.google.com/spreadsheets/d/14lpXHBMspZrdAAMQlTYuezE74gM2HK6z6kskLwqWvdU/export?format=csv&t=${cacheBuster}`;

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/);

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
                if (row.length < 4) continue;

                const nameInSheet = row[2] ? row[2].toLowerCase().trim() : ''; 
                const tinInSheet = row[3] ? row[3].toLowerCase().trim() : '';   

                if (nameInSheet.includes(query) || tinInSheet.includes(query)) {
                    matchedRows.push(row);
                }
            }

            if (matchedRows.length === 0) {
                alert("Sorry, no data found for this Name or TIN!");
            } else if (matchedRows.length === 1) {
                showTaxpayerDetails(0);
            } else {
                MathResultsList.style.display = "block";
                MathResultsList.innerHTML = `<p>Multiple (${matchedRows.length}) taxpayers found. Please choose one:</p>`;
                
                matchedRows.forEach((row, index) => {
                    // আপনার রিকোয়েস্ট অনুযায়ী ডাটা ম্যাপিং (SL, Name, TIN, Mobile, Ref)
                    const sl = row[1] || 'N/A';
                    const name = row[2] || 'N/A';
                    const tin = row[3] || 'N/A';
                    const mobile = row[4] || 'N/A';
                    const ref = row[9] || 'N/A';
                    
                    const item = document.createElement("div");
                    item.className = "result-item";
                    
                    // আপনার পছন্দের কলামগুলো ১ লাইনে সেট করা হলো
                    item.innerHTML = `<strong>SL:</strong> ${sl} | <strong>Name:</strong> ${name} | <strong>TIN:</strong> ${tin} | <strong>Mobile:</strong> ${mobile} | <strong>Ref:</strong> ${ref}`;
                    
                    item.onclick = function() { showTaxpayerDetails(index); };
                    MathResultsList.appendChild(item);
                });
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Failed to load database data!");
        } finally {
            loadingText.style.display = "none";
        }
    }

    function showTaxpayerDetails(index) {
        const row = matchedRows[index];
        const resultTable = document.getElementById("resultTable");
        const getVal = (idx) => (row[idx] !== undefined && row[idx] !== '') ? row[idx] : 'N/A';

        document.getElementById("resSl").value = getVal(1);         
        document.getElementById("resName").value = getVal(2);       
        document.getElementById("resTin").value = getVal(3);        
        document.getElementById("resMobile").value = getVal(4);     
        document.getElementById("resPassword").value = getVal(5);   
        document.getElementById("resZone").value = getVal(6);       
        document.getElementById("resCircle").value = getVal(7);     
        document.getElementById("resAddress").value = getVal(8);    
        document.getElementById("resRef").value = getVal(9);        
        document.getElementById("resLives").value = getVal(10);     
        
        if (row[11] !== undefined) {
            document.getElementById("resStatus").innerText = row[11].trim(); 
        } else {
            document.getElementById("resStatus").innerText = 'N/A';
        }
        resultTable.style.display = "table";
    }
</script>

</body>
</html>
