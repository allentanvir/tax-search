<!DOCTYPE html>
<html>
<body>
    <input type="text" id="s" placeholder="Search...">
    <button onclick="f()">Search</button>
    <div id="r"></div>

<script>
    // আপনার লিংকটি নিচে বসানো আছে
    const URL = "https://script.google.com/macros/s/AKfycby_7qaz7zrpPh4PSkPdJ0sG1Oj8NPD2w4mzbn_ZbNFMlqR2EWuwFK5gxyESPE3gUL3C5Q/exec";

    function f() {
        document.getElementById("r").innerHTML = "Searching...";
        fetch(URL).then(res => res.json()).then(data => {
            let q = document.getElementById("s").value.toLowerCase();
            let res = data.filter(row => row.some(cell => String(cell).toLowerCase().includes(q)));
            let html = "<table border='1'>";
            res.forEach(row => { html += "<tr><td>" + row.join("</td><td>") + "</td></tr>"; });
            document.getElementById("r").innerHTML = html + "</table>";
        });
    }
</script>
</body>
</html>
