<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tax Search</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<input type="text" id="s" placeholder="নাম বা TIN লিখে সার্চ করুন...">
<button onclick="search()">Search</button>
<div id="res"></div>

<script>
    async function search() {
        // আপনার Airtable এর API Key এখানে সরাসরি বসিয়ে দিন
        const API_KEY = 'YOUR_API_TOKEN_HERE'; 
        const BASE_ID = 'appiCd1uhxd82eZDX';
        const TABLE = 'Tax%20Records';
        
        const q = document.getElementById("s").value.toLowerCase();
        if(!q) return;

        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;
        
        const res = await fetch(url, { headers: { Authorization: `Bearer ${API_KEY}` } });
        const data = await res.json();
        
        const f = data.records.filter(r => 
            r.fields['Assesee Name']?.toLowerCase().includes(q) || 
            r.fields['Tin']?.toString().includes(q)
        );

        document.getElementById("res").innerHTML = f.length ? 
            f.map(r => `<p>${r.fields['Assesee Name']} - ${r.fields['Tin']}</p>`).join('') : 
            "কোনো তথ্য পাওয়া যায়নি।";
    }
</script>
</body>
</html>
