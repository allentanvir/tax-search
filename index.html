<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tax Search</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3>Tax Search (Airtable)</h3>
    <input type="password" id="tkn" placeholder="আপনার Airtable API Token এখানে দিন">
    <input type="text" id="s" placeholder="নাম বা TIN লিখে সার্চ করুন...">
    <button class="btn" onclick="search()">Search</button>
    <div id="res"></div>
</div>

<script>
    async function search() {
        const token = document.getElementById("tkn").value;
        const query = document.getElementById("s").value.toLowerCase();
        const resDiv = document.getElementById("res");

        if(!token || !query) { alert("সব তথ্য পূরণ করুন"); return; }

        const url = "https://api.airtable.com/v0/appiCd1uhxd82eZDX/Tax%20Records";
        
        try {
            const response = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            const data = await response.json();
            
            const filtered = data.records.filter(r => 
                (r.fields['Assesee Name']?.toLowerCase().includes(query)) || 
                (r.fields['Tin']?.toString().includes(query))
            );

            resDiv.innerHTML = filtered.length ? filtered.map(r => `
                <div style='margin-top:10px; border-left:4px solid green; padding:5px;'>
                    <b>Name:</b> ${r.fields['Assesee Name'] || 'N/A'}<br>
                    <b>TIN:</b> ${r.fields['Tin'] || 'N/A'}<br>
                    <b>Mobile:</b> ${r.fields['Mobail No'] || 'N/A'}<br>
                    <b>Address:</b> ${r.fields['Address'] || 'N/A'}
                </div>`).join('') : "কোনো তথ্য পাওয়া যায়নি।";
        } catch(e) { resDiv.innerHTML = "Error: টোকেন বা কানেকশনে সমস্যা আছে।"; }
    }
</script>
</body>
</html>
