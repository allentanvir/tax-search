<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-search { background: #007bff; }
        .btn-save { background: #28a745; margin-top: 10px; }
        
        /* নীল বাটন */
        .collapsible-header { background: #0056b3; color: white; padding: 15px; text-align: center; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        #inputForm { display: none; padding: 15px; border: 1px solid #0056b3; border-top: none; }
    </style>
</head>
<body>

<div class="container">
    <h3>TAX Payment Database</h3>
    
    <input type="text" id="searchInput" placeholder="Search by Name or TIN...">
    <button class="btn btn-search" onclick="searchData()">Search</button>

    <div class="collapsible-header" onclick="toggleForm()">&#11139;</div>

    <div id="inputForm">
        <input type="text" id="sl" placeholder="Serial No *">
        <input type="text" id="name" placeholder="Assessee Name *">
        <input type="text" id="tin" placeholder="Tin *">
        <input type="text" id="mobile" placeholder="Mobile">
        <input type="text" id="zone" placeholder="Zone">
        <input type="text" id="circle" placeholder="Circle">
        <input type="text" id="address" placeholder="Address">
        <button class="btn btn-save" onclick="saveData()">Save Data</button>
    </div>
</div>

<script>
    function toggleForm() {
        var f = document.getElementById("inputForm");
        f.style.display = (f.style.display === "block") ? "none" : "block";
    }

    function searchData() {
        var query = document.getElementById("searchInput").value;
        alert("সার্চ করা হচ্ছে: " + query + ". (দ্রষ্টব্য: আপনার গুগল শিট লিংকটি কানেক্ট করা নেই)");
    }

    function saveData() {
        alert("ডাটা সেভ করা হচ্ছে... (আপনার Apps Script URL প্রয়োজন)");
    }
</script>

</body>
</html>
