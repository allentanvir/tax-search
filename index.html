<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TAX Database</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        /* নীল বাটন স্টাইল */
        .collapsible-header { background: #007bff; color: white; padding: 15px; cursor: pointer; text-align: center; border-radius: 4px; }
        /* আপলোড আইকন (এন্ড্রয়েড স্টাইল) */
        .upload-icon { width: 24px; filter: invert(1); }
        /* ফর্ম এবং সার্চ বক্স */
        #inputFormContainer { display: none; padding: 15px; border: 1px solid #007bff; border-top: none; }
        input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="searchInput" placeholder="Search by Name or TIN...">
    <button onclick="searchData()">Search</button>
    <div id="resultArea"></div>

    <br>

    <div class="collapsible-header" onclick="toggleForm()">
        <img src="https://cdn-icons-png.flaticon.com/512/3024/3024500.png" class="upload-icon">
    </div>

    <div id="inputFormContainer">
        <form id="dataForm">
            <input type="text" id="serial" placeholder="Serial No">
            <input type="text" id="name" placeholder="Assessee Name">
            <input type="text" id="tin" placeholder="TIN">
            <input type="text" id="mobile" placeholder="Mobile">
            <input type="text" id="zone" placeholder="Zone">
            <button type="submit" class="btn-submit">Save Data</button>
        </form>
    </div>
</div>

<script>
    // টগল লজিক
    function toggleForm() {
        var f = document.getElementById("inputFormContainer");
        f.style.display = (f.style.display === "block") ? "none" : "block";
    }

    // সার্চ লজিক
    function searchData() {
        var input = document.getElementById("searchInput").value;
        if(!input) { alert("Enter search text"); return; }
        // এখানে আপনার ডাটা ফেচিং লজিক বসবে
        alert("Searching for: " + input);
    }
</script>

</body>
</html>
