<!DOCTYPE html>
<html>
<body>
    <input type="text" id="sInput" placeholder="Name or TIN">
    <button onclick="doSearch()">Search</button>

    <div id="btnUpload" style="background:#007bff; width:40px; padding:10px; cursor:pointer;" onclick="toggleForm()">
        <img src="https://cdn-icons-png.flaticon.com/512/126/126467.png" style="width:20px; filter:invert(1);">
    </div>

    <div id="fContainer" style="display:none; border:1px solid #007bff; padding:10px;">
        <input type="text" id="nName" placeholder="Name">
        <button onclick="saveData()">Submit</button>
    </div>

    <script>
        const URL = "YOUR_WEB_APP_URL"; // এখানে লিংক দিন

        function toggleForm() {
            let f = document.getElementById("fContainer");
            f.style.display = (f.style.display === "block") ? "none" : "block";
        }

        function doSearch() {
            alert("সার্চ কাজ করছে! আপনার শিটটি কি 'Anyone with link' হিসেবে পাবলিশ করা?");
        }

        function saveData() {
            let p = { name: document.getElementById("nName").value };
            fetch(URL, { method: "POST", body: JSON.stringify(p) });
            alert("ডাটা পাঠানো হয়েছে!");
        }
    </script>
</body>
</html>
