<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .search-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .result-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .row { display: flex; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        .label { font-weight: bold; color: #555; width: 40%; }
        .value { color: #000; width: 60%; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <h3 style="margin-top:0;">TAX Information Search</h3>
        <input type="text" id="s" placeholder="Enter Name or TIN...">
        <button class="btn" onclick="search()">Search Now</button>
    </div>
    <div id="res"></div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycby_7qaz7zrpPh4PSkPdJ0sG1Oj8NPD2w4mzbn_ZbNFMlqR2EWuwFK5gxyESPE3gUL3C5Q/exec";
    
    function search() {
        let q = document.getElementById("s").value.toLowerCase();
        document.getElementById("res").innerHTML = "Searching...";
        fetch(URL + "?q=" + q).then(res => res.json()).then(data => {
            let html = "";
            let filtered = data.filter(r => r.some(c => String(c).toLowerCase().includes(q)));
            
            filtered.forEach(r => {
                html += `<div class='result-card'>
                    <div class='row'><span class='label'>Serial:</span><span class='value'>${r[0]}</span></div>
                    <div class='row'><span class='label'>Name:</span><span class='value'>${r[1]}</span></div>
                    <div class='row'><span class='label'>TIN:</span><span class='value'>${r[2]}</span></div>
                    <div class='row'><span class='label'>Mobile:</span><span class='value'>${r[3]}</span></div>
                    <div class='row'><span class='label'>Password:</span><span class='value'>${r[4]}</span></div>
                    <div class='row'><span class='label'>Zone:</span><span class='value'>${r[5]}</span></div>
                    <div class='row'><span class='label'>Circle:</span><span class='value'>${r[6]}</span></div>
                    <div class='row'><span class='label'>Address:</span><span class='value'>${r[7]}</span></div>
                    <div class='row'><span class='label'>Ref:</span><span class='value'>${r[8]}</span></div>
                    <div class='row'><span class='label'>Lives:</span><span class='value'>${r[9]}</span></div>
                    <div class='row'><span class='label'>Status:</span><span class='value'>${r[10]}</span></div>
                </div>`;
            });
            document.getElementById("res").innerHTML = html || "No record found.";
        });
    }
</script>
</body>
</html>
