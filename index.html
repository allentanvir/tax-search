<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAX Payment Database Search</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 30px;
            color: #555555;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 20px;
            color: #5c768d;
            font-weight: normal;
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 25px;
        }
        .search-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .search-row label {
            width: 150px;
            font-size: 14px;
            color: #333333;
            font-weight: bold;
        }
        .search-row label span {
            color: red;
        }
        .input-group {
            display: flex;
            flex: 1;
            gap: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            color: #333;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-search:hover {
            background-color: #0069d9;
        }
        .loading {
            display: none;
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            font-style: italic;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            display: none;
        }
        .result-table td {
            padding: 8px 0;
            vertical-align: middle;
            font-size: 14px;
        }
        .result-table td.label-cell {
            width: 150px;
            color: #333333;
            font-weight: bold;
        }
        .result-table td.value-cell {
            padding-left: 10px;
        }
        .result-table input, .result-table textarea {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            background-color: #f8f9fa;
            color: #333333;
            font-size: 14px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
            resize: none;
            outline: none;
        }
        .status-badge {
            display: inline-block;
            background-color: #17a2b8;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">TAX Payment Database</div>
    
    <div class="search-row">
        <label>Search Taxpayer <span>*</span></label>
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Enter Name or TIN...">
            <button class="btn-search" onclick="searchFromSheet()">
                <svg width="14" height="14" fill="white" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="loadingText" class="loading">Searching database...</div>

    <table class="result-table" id="resultTable">
        <tr>
            <td class="label-cell">SL.</td>
            <td class="value-cell"><input type="text" id="resSl" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Assessee Name</td>
            <td class="value-cell"><input type="text" id="resName" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Tin</td>
            <td class="value-cell"><input type="text" id="resTin" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Mobail No</td>
            <td class="value-cell"><input type="text" id="resMobile" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Password</td>
            <td class="value-cell"><input type="text" id="resPassword" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Zone</td>
            <td class="value-cell"><input type="text" id="resZone" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Circle</td>
            <td class="value-cell"><input type="text" id="resCircle" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Address</td>
            <td class="value-cell"><textarea id="resAddress" rows="2" readonly></textarea></td>
        </tr>
        <tr>
            <td class="label-cell">Ref</td>
            <td class="value-cell"><input type="text" id="resRef" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Lives</td>
            <td class="value-cell"><input type="text" id="resLives" readonly></td>
        </tr>
        <tr>
            <td class="label-cell">Work Status</td>
            <td class="value-cell"><span id="resStatus" class="status-badge"></span></td>
        </tr>
    </table>
</div>

<script>
    const url = `https://docs.google.com/spreadsheets/d/14lpXHBMspZrdAAMQlTYuezE74gM2HK6z6kskLwqWvdU/export?format=csv`;

    async function searchFromSheet() {
        const query = document.getElementById("searchInput").value.toLowerCase().trim();
        const resultTable = document.getElementById("resultTable");
        const loadingText = document.getElementById("loadingText");

        if (!query) {
            alert("Please enter Name or TIN!");
            return;
        }

        loadingText.style.display = "block";
        resultTable.style.display = "none";

        try {
            const response = await fetch(url);
            const csvText = await response.text();
            
            // লাইন ব্রেক হ্যান্ডেল করার জন্য উন্নত রেগুলার এক্সপ্রেশন (\r\n বা \n দুটোই কেটে দেবে)
            const lines = csvText.split(/\r?\n/);
            let dataFound = false;

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // নিখুঁতভাবে অ্যাড্রেসের ভেতরের কমা হ্যান্ডেল করার চমৎকার লজিক
                const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());

                if (row.length < 3) continue;

                const nameInSheet = row[1] ? row[1].toLowerCase().trim() : ''; 
                const tinInSheet = row[2] ? row[2].toLowerCase().trim() : '';   

                if (nameInSheet.includes(query) || tinInSheet.includes(query)) {
                    
                    const getVal = (index) => (row[index] !== undefined && row[index] !== '') ? row[index] : 'N/A';

                    document.getElementById("resSl").value = getVal(0);       
                    document.getElementById("resName").value = getVal(1);     
                    document.getElementById("resTin").value = getVal(2);      
                    document.getElementById("resMobile").value = getVal(3);   
                    document.getElementById("resPassword").value = getVal(4); 
                    document.getElementById("resZone").value = getVal(5);     
                    document.getElementById("resCircle").value = getVal(6);   
                    document.getElementById("resAddress").value = getVal(7);  
                    document.getElementById("resRef").value = getVal(8);     
                    document.getElementById("resLives").value = getVal(9);    
                    
                    // Work Status কলামের অদৃশ্য স্পেস/ক্যারেক্টার ট্রিম করা হলো
                    document.getElementById("resStatus").innerText = getVal(10).trim(); 

                    resultTable.style.display = "table";
                    dataFound = true;
                    break; 
                }
            }

            if (!dataFound) {
                alert("Sorry, no data found for this Name or TIN!");
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Failed to load database data!");
        } finally {
            loadingText.style.display = "none";
        }
    }
</script>

</body>
</html>
